<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Lee Juho | ESblueRin</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="cursor-glow"></div>

  <header class="site-header">
    <div class="nav-container">
      <a class="logo" href="#home">ESblueRin</a>

      <nav class="nav-menu">
        <a class="nav-link" href="#home" data-route="home">Home</a>
        <a class="nav-link" href="#projects" data-route="projects">Projects</a>
        <a class="nav-link" href="#profile" data-route="profile">Profile</a>
        <a class="nav-link" href="#hobby" data-route="hobby">Hobby</a>
      </nav>

      <div class="top-music-player">
        <button id="musicButton" class="music-control" type="button" aria-label="Play or pause music">
          ▶
        </button>

        <div class="music-meta">
          <span class="music-label">Now Playing</span>
          <span id="musicTitle" class="music-title">Random BGM</span>
        </div>

        <input
          id="musicSeek"
          class="music-seek"
          type="range"
          min="0"
          max="100"
          value="0"
          aria-label="Music progress"
        />

        <button id="nextTrackButton" class="music-next" type="button" aria-label="Next track">
          ↻
        </button>
      </div>

      <button class="theme-toggle" type="button" aria-label="Toggle theme">◐</button>
    </div>
  </header>

  <main id="app" class="app-root"></main>

  <footer class="site-footer">
    <p>© 2026 Lee Juho. Built with GitHub Pages.</p>
  </footer>

  <audio id="bgmAudio" preload="metadata" loop></audio>

  <script src="script.js"></script>
</body>
</html>
